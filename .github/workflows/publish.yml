name: Publish Bluefin dakota

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Bluefin dakota"]
    types: [completed]
    branches:
      - main
      - 'gh-readonly-queue/main/**'

env:
  IMAGE_NAME: dakota
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

permissions: read-all

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # Variant matrix: default and NVIDIA publish in parallel from the shared
    # BST artifact cache. NVIDIA is `continue-on-error: true` so its failure
    # does not block default publication.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            element: oci/bluefin.bst
            image_suffix: ''
            sbom_filename: dakota.spdx.json
            continue: false
          - variant: nvidia
            element: oci/bluefin-nvidia.bst
            image_suffix: '-nvidia'
            sbom_filename: dakota-nvidia.spdx.json
            continue: true
    continue-on-error: ${{ matrix.continue }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: read
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request' &&
       (github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'gh-readonly-queue/main/')))
    steps:
      - name: Resolve build SHA and trigger event
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event.workflow_run.event }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.context.outputs.sha }}

      - name: Setup Just
        uses: taiki-e/install-action@7be9fd86bd1707236395105d6e9329dd1511a7e1 # v2
        with:
          tool: just

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Remove unwanted software
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      # Fetch-only BST config — pull artifact from remote CAS, no build/push
      - name: Generate BST fetch config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          mkdir -p logs
          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFFETCH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
          BSTCONFFETCH
          fi

      - name: Export OCI image from BuildStream
        id: export
        env:
          BST_FLAGS: -o x86_64_v3 true --no-interactive --config /src/buildstream-ci.conf
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          OCI_IMAGE_REVISION: ${{ steps.context.outputs.sha }}
          OCI_IMAGE_VERSION: latest
        run: just export ${{ matrix.variant }}

      - name: Validate with bootc container lint
        env:
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
        run: just lint

      - name: Generate SBOM
        env:
          BST_FLAGS: -o x86_64_v3 true --no-interactive --config /src/buildstream-ci.conf
        run: just sbom ${{ matrix.variant }}

      - name: Upload SBOM artifact for release workflow
        if: matrix.variant == 'default'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ steps.context.outputs.sha }}
          path: dakota.spdx.json
          retention-days: 30

      - name: Login to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin
          mkdir -p ~/.docker
          echo "$GH_TOKEN" | podman login ghcr.io --username "$GH_ACTOR" --password-stdin \
            --compat-auth-file ~/.docker/config.json

      - name: Push to GHCR
        id: push
        env:
          BUILD_SHA: ${{ steps.context.outputs.sha }}
          TRIGGER_EVENT: ${{ steps.context.outputs.event }}
        run: |
          LOCAL_IMAGE="${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}"
          IMAGE="${{ env.IMAGE_REGISTRY }}/${LOCAL_IMAGE}"

          # Always tag and push :$BUILD_SHA
          sudo podman tag "localhost/${LOCAL_IMAGE}:latest" "${IMAGE}:${BUILD_SHA}"

          PUSH_OK=false
          for attempt in 1 2 3; do
            sudo podman push --compression-format=zstd \
              --digestfile /tmp/digest.txt \
              "${IMAGE}:${BUILD_SHA}" && { PUSH_OK=true; break; }
            echo "Push attempt ${attempt} failed for :${BUILD_SHA}, retrying in 5s..."
            [ "$attempt" -lt 3 ] && sleep 5
          done
          $PUSH_OK || { echo "ERROR: all push attempts failed for :${BUILD_SHA}"; exit 1; }

          # Push :latest on schedule or workflow_dispatch (including downstream from build.yml dispatch)
          if [[ "$TRIGGER_EVENT" == "schedule" || "$TRIGGER_EVENT" == "workflow_dispatch" ]]; then
            sudo podman tag "localhost/${LOCAL_IMAGE}:latest" "${IMAGE}:latest"
            PUSH_OK=false
            for attempt in 1 2 3; do
              sudo podman push --compression-format=zstd \
                "${IMAGE}:latest" && { PUSH_OK=true; break; }
              echo "Push attempt ${attempt} failed for :latest, retrying in 5s..."
              [ "$attempt" -lt 3 ] && sleep 5
            done
            $PUSH_OK || { echo "ERROR: all push attempts failed for :latest"; exit 1; }
          fi

          echo "digest=$(cat /tmp/digest.txt)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign -y \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${DIGEST}"

      - name: Attach SBOM
        id: sbom-attach
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -o pipefail
          SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.spdx+json \
            --format json \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${DIGEST}" \
            ${{ matrix.sbom_filename }}:application/vnd.spdx+json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['digest'])")
          if [[ -z "$SBOM_DIGEST" || "$SBOM_DIGEST" == "None" ]]; then
            echo "ERROR: Failed to capture SBOM digest from oras attach"
            exit 1
          fi
          echo "sbom_digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign SBOM
        env:
          SBOM_DIGEST: ${{ steps.sbom-attach.outputs.sbom_digest }}
        run: |
          cosign sign -y \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${SBOM_DIGEST}"

      - name: SLSA attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
